<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mixue Reservation</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <header>
        <nav class="navbar">
            <div class="logo">
                <img src="images/mixue.png" alt="Mixue Logo">
                <h2>Mixue</h2>
            </div>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="services.html">Menu</a></li>
                <li><a href="contact.html">Reservation</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="form-section">
            <h1 class="section-title">Reservation Form</h1>
            <p class="section-subtitle">Choose your product and select your favorite flavor!</p>

            <form id="reservationForm">
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" id="name" placeholder="Enter your full name" required>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="email" placeholder="your@email.com" required>
                    </div>
                    <div class="form-group">
                        <label>Contact Number</label>
                        <input type="tel" id="phone" placeholder="0912 345 6789" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Select Product</label>
                    <select id="product" required>
                        <option value=""></option>
                        <option value="Ice Cream Cone" data-flavors='["Vanilla","Chocolate","Strawberry","Matcha","Cookies & Cream","Mango","Rocky Road"]'>Ice Cream Cone - ₱39</option>
                        <option value="Soft Serve Twist" data-flavors='["Vanilla-Choco Twist","Strawberry-Vanilla","Matcha-Vanilla","Mango-Vanilla","Choco-Matcha"]'>Soft Serve Twist - ₱49</option>
                        <option value="Chocolate Sundae" data-flavors='["Chocolate","Strawberry","Caramel","Blueberry","Oreo","Mango"]'>Chocolate Sundae - ₱59</option>
                        <option value="Fresh Lemonade" data-flavors='["Original","Strawberry","Blueberry","Peach","Lychee","Green Apple","Mango"]'>Fresh Lemonade - ₱49</option>
                        <option value="Fruit Tea" data-flavors='["Passion Fruit","Peach","Mango","Lychee Rose","Kiwi","Mixed Berries","Strawberry"]'>Fruit Tea - ₱55</option>
                        <option value="Milk Tea Series" data-flavors='["Classic Milk Tea","Okinawa","Taro","Matcha","Wintermelon","Brown Sugar","Hokkaido","Thai Milk Tea"]'>Milk Tea Series - ₱59</option>
                        <option value="Cheese Tea" data-flavors='["Jasmine Green Tea","Black Tea","Oolong Tea","Strawberry","Mango","Peach"]'>Cheese Tea - ₱69</option>
                        <option value="Snow Ice" data-flavors='["Mango","Strawberry","Chocolate","Matcha","Taro","Blueberry"]'>Snow Ice - ₱79</option>
                    </select>
                </div>

                <div class="form-group" id="flavorGroup" style="display: none;">
                    <label>Select Your Flavor</label>
                    <div id="flavorButtons" class="flavor-buttons-group"></div>
                    <input type="hidden" id="selectedFlavor" value="">
                </div>

                <div class="form-group">
                    <label>Quantity</label>
                    <input type="number" id="quantity" min="1" max="20" value="1" required>
                </div>

                <div class="form-group">
                    <label>Special Instructions (Optional)</label>
                    <textarea id="message" rows="3" placeholder="Any special requests? (e.g., less sugar, extra ice, no toppings, etc.)"></textarea>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label>Reservation Date</label>
                        <input type="date" id="date" required>
                    </div>
                    <div class="form-group">
                        <label>Reservation Time</label>
                        <input type="time" id="time" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>Service Type</label>
                    <select id="serviceType" required>
                        <option value="Dine In">Dine In</option>
                        <option value="Take Out">Take Out</option>
                        <option value="Delivery">Delivery (Extra ₱30)</option>
                    </select>
                </div>

                <div class="price-summary" id="priceSummary" style="display: none;">
                    <p>Subtotal: ₱<span id="subtotal">0</span></p>
                    <p id="deliveryFeeRow" style="display: none;">Delivery Fee: ₱30</p>
                    <p><strong>Total Amount: ₱<span id="totalAmount">0</span></strong></p>
                </div>

                <button type="submit">Confirm Reservation</button>
            </form>

            <div id="confirmation"></div>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Mixue Order and Reservation Management System</p>
    </footer>

    <script src="js/app.js"></script>
</body>
</html>
